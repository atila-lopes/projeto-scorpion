<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Scorpion Control</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!------------------------------------
    Container principal
    ------------------------------------->

    <div id="container">

        <!--------------------------------
        Título
        --------------------------------->

        <h1>SCORPION CONTROL</h1>

        <!--------------------------------
        Área principal
        --------------------------------->

        <div id="main">

            <!----------------------------
            Joystick
            ----------------------------->

            <div id="left">

                <div id="joystick">

                    <div id="stick"></div>

                </div>

            </div>

            <!----------------------------
            Controle de velocidade
            ----------------------------->

            <div id="right">

                <button
                    id="botaoAumentarVelocidade"
                    class="botao-circular"
                >
                    +
                </button>

                <div id="speedValue">
                    100%
                </div>

                <button
                    id="botaoDiminuirVelocidade"
                    class="botao-circular"
                >
                    −
                </button>

            </div>

        </div>

        <!--------------------------------
        Informações
        --------------------------------->

        <div id="info">

            <p>

                X:
                <span id="xValue">
                    0.00
                </span>

            </p>

            <p>

                Y:
                <span id="yValue">
                    0.00
                </span>

            </p>

            <p id="lastCommand">

                Parado

            </p>

        </div>

        <!--------------------------------
        Gerenciamento de rotas
        --------------------------------->

        <div id="rotas">

            <h2>Rotas</h2>

            <div id="controlesRotas">

                <button
                    id="botaoAprenderRota"
                    class="botao-acao"
                >
                    Aprender
                </button>

                <button
                    id="botaoFinalizarRota"
                    class="botao-acao"
                >
                    Finalizar
                </button>

                <button id="executarRota">
                    Executar
                </button>

                <button
                    id="botaoRotas"
                    class="botao-acao"
                >
                    Rotas
                </button>

            </div>

        </div>

    </div>

    <!------------------------------------
    Scripts
    ------------------------------------->

    <script src="script.js"></script>

</body>

</html>
