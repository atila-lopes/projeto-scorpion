<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Controle do E-Puck</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

    <h1>Controle do E-Puck</h1>

    <div id="mainPanel">

        <div id="leftPanel">

            <div id="joystick">
                <div id="stick"></div>
            </div>

        </div>

        <div id="rightPanel">

            <h2>Velocidade</h2>

            <button id="plus">+</button>

            <span id="speedValue">100%</span>

            <button id="minus">-</button>

            <hr>

            <p>X: <span id="xValue">0.00</span></p>

            <p>Y: <span id="yValue">0.00</span></p>

            <p>Estado:
                <span id="connection">
                    Conectado
                </span>
            </p>

            <p>Último comando:
                <span id="lastCommand">
                    Parado
                </span>
            </p>

        </div>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
