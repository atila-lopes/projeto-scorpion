<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Scorpion Control</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="container">

<h1>SCORPION CONTROL</h1>

<div id="main">

<div id="left">

<div id="joystick">

<div id="stick"></div>

</div>

</div>

<div id="right">

<button id="plus">+</button>

<div id="speedValue">
100%
</div>

<button id="minus">−</button>

</div>

</div>

<div id="info">

<p>

X:
<span id="xValue">
0.00
</span>

</p>

<p>

Y:
<span id="yValue">
0.00
</span>

</p>

<p id="lastCommand">

Parado

</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
